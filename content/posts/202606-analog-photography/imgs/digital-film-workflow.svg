<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Digital and film photography workflow comparison</title>
  <desc id="desc">A minimal workflow diagram comparing the usual digital and film photography process.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <style>
      .heading { fill: #111; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .step { fill: #222; font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #444; font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #222; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <text class="heading" x="70" y="92">Digital</text>

  <text class="step" x="210" y="82" text-anchor="middle">Turn on</text>
  <text class="step" x="210" y="106" text-anchor="middle">camera</text>

  <path class="arrow" d="M 260 94 H 330"/>

  <text class="step" x="400" y="94" text-anchor="middle">Adjust EV</text>

  <path class="arrow" d="M 455 94 H 525"/>

  <text class="step" x="600" y="82" text-anchor="middle">Take a</text>
  <text class="step" x="600" y="106" text-anchor="middle">picture</text>

  <path class="arrow" d="M 660 94 H 730"/>

  <text class="step" x="820" y="82" text-anchor="middle">Preview</text>
  <text class="step" x="820" y="106" text-anchor="middle">instantly</text>

  <path class="arrow" d="M 888 84 C 930 56 966 54 1010 62"/>
  <text class="step" x="1080" y="66" text-anchor="middle">Use image</text>
  <text class="step" x="1080" y="90" text-anchor="middle">as is</text>

  <path class="arrow" d="M 888 104 C 930 136 966 142 1010 142"/>
  <text class="step" x="1080" y="136" text-anchor="middle">Open</text>
  <text class="step" x="1080" y="160" text-anchor="middle">Lightroom</text>
  <text class="small" x="1080" y="184" text-anchor="middle">push RAW later</text>

  <text class="heading" x="70" y="268">Film</text>

  <text class="step" x="210" y="256" text-anchor="middle">Pick up</text>
  <text class="step" x="210" y="280" text-anchor="middle">camera</text>

  <path class="arrow" d="M 260 268 H 330"/>

  <text class="step" x="400" y="256" text-anchor="middle">Estimate</text>
  <text class="step" x="400" y="280" text-anchor="middle">exposure</text>

  <path class="arrow" d="M 455 268 H 525"/>

  <text class="step" x="600" y="256" text-anchor="middle">Take a</text>
  <text class="step" x="600" y="280" text-anchor="middle">picture</text>

  <path class="arrow" d="M 660 268 H 730"/>

  <text class="step" x="820" y="256" text-anchor="middle">Develop</text>
  <text class="step" x="820" y="280" text-anchor="middle">and scan</text>

  <path class="arrow" d="M 888 268 H 998"/>

  <text class="step" x="1080" y="244" text-anchor="middle">Get final</text>
  <text class="step" x="1080" y="268" text-anchor="middle">digitized</text>
  <text class="step" x="1080" y="292" text-anchor="middle">image</text>
</svg>
